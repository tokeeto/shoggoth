name: Build Executable

on:
    push:
        branches: ["main"]
        tags: ["v*"]
    workflow_dispatch:
        inputs:
            sign:
                description: "Sign the macOS build"
                type: boolean
                default: false

env:
    SHOULD_SIGN: ${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'push' && github.ref == 'refs/heads/main' || inputs.sign == true }}

jobs:
    build-macos-intel:
        runs-on: macos-15-intel
        steps:
            - uses: actions/checkout@v3
            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.12"
            - name: Install uv
              uses: astral-sh/setup-uv@v6
            - name: Install the project
              run: uv sync
            - name: Install pyinstaller
              run: uv add --dev pyinstaller
            - name: Install harfbuzz
              run: brew install harfbuzz

            - name: Import Apple Developer Certificate
              if: ${{ env.SHOULD_SIGN == 'true' }}
              env:
                  APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
                  APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
                  KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
              run: |
                  echo $APPLE_CERTIFICATE | base64 --decode > certificate.p12
                  security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
                  security default-keychain -s build.keychain
                  security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
                  security import certificate.p12 -k build.keychain \
                    -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
                  security set-key-partition-list -S apple-tool:,apple:,codesign: \
                    -s -k "$KEYCHAIN_PASSWORD" build.keychain
                  security find-identity -v -p codesigning build.keychain
                  rm certificate.p12

            - name: Compile
              run: uv run --dev pyinstaller ShoggothStandalone.spec
              env:
                  APPLE_SIGNING_IDENTITY: ${{ env.SHOULD_SIGN == 'true' && secrets.APPLE_SIGNING_IDENTITY || '' }}

            - name: Notarize and staple app
              if: ${{ env.SHOULD_SIGN == 'true' }}
              env:
                  APPLE_ID: ${{ secrets.APPLE_ID }}
                  APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
                  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
              run: |
                  ditto -c -k --keepParent "dist/Shoggoth.app" Shoggoth.zip
                  xcrun notarytool submit Shoggoth.zip \
                    --apple-id "$APPLE_ID" \
                    --password "$APPLE_PASSWORD" \
                    --team-id "$APPLE_TEAM_ID" \
                    --wait --timeout 900 2>&1 | tee notarize_output.txt

                  if ! grep -q "status: Accepted" notarize_output.txt; then
                    SUBMISSION_ID=$(grep -oE '[0-9a-f-]{36}' notarize_output.txt | head -1)
                    if [ -n "$SUBMISSION_ID" ]; then
                      xcrun notarytool log "$SUBMISSION_ID" \
                        --apple-id "$APPLE_ID" \
                        --password "$APPLE_PASSWORD" \
                        --team-id "$APPLE_TEAM_ID"
                    fi
                    exit 1
                  fi

                  xcrun stapler staple "dist/Shoggoth.app"

            - name: Zip app for upload
              run: ditto -c -k --keepParent "dist/Shoggoth.app" Shoggoth.zip
              if: ${{ env.SHOULD_SIGN != 'true' }}

            - name: Zip signed app for upload
              if: ${{ env.SHOULD_SIGN == 'true' }}
              run: |
                  rm -f Shoggoth.zip
                  ditto -c -k --keepParent "dist/Shoggoth.app" Shoggoth.zip

            - uses: actions/upload-artifact@v4
              with:
                  name: shoggoth-mac-intel
                  path: Shoggoth.zip

    build-macos:
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v3
            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.12"
            - name: Install uv
              uses: astral-sh/setup-uv@v6
            - name: Install the project
              run: uv sync
            - name: Install pyinstaller
              run: uv add --dev pyinstaller
            - name: Install harfbuzz
              run: brew install harfbuzz

            - name: Import Apple Developer Certificate
              if: ${{ env.SHOULD_SIGN == 'true' }}
              env:
                  APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
                  APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
                  KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
              run: |
                  echo $APPLE_CERTIFICATE | base64 --decode > certificate.p12
                  security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
                  security default-keychain -s build.keychain
                  security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
                  security import certificate.p12 -k build.keychain \
                    -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
                  security set-key-partition-list -S apple-tool:,apple:,codesign: \
                    -s -k "$KEYCHAIN_PASSWORD" build.keychain
                  security find-identity -v -p codesigning build.keychain
                  rm certificate.p12

            - name: Compile
              run: uv run --dev pyinstaller ShoggothStandalone.spec
              env:
                  APPLE_SIGNING_IDENTITY: ${{ env.SHOULD_SIGN == 'true' && secrets.APPLE_SIGNING_IDENTITY || '' }}

            - name: Notarize and staple app
              if: ${{ env.SHOULD_SIGN == 'true' }}
              env:
                  APPLE_ID: ${{ secrets.APPLE_ID }}
                  APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
                  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
              run: |
                  ditto -c -k --keepParent "dist/Shoggoth.app" Shoggoth.zip
                  xcrun notarytool submit Shoggoth.zip \
                    --apple-id "$APPLE_ID" \
                    --password "$APPLE_PASSWORD" \
                    --team-id "$APPLE_TEAM_ID" \
                    --wait --timeout 900 2>&1 | tee notarize_output.txt

                  if ! grep -q "status: Accepted" notarize_output.txt; then
                    SUBMISSION_ID=$(grep -oE '[0-9a-f-]{36}' notarize_output.txt | head -1)
                    if [ -n "$SUBMISSION_ID" ]; then
                      xcrun notarytool log "$SUBMISSION_ID" \
                        --apple-id "$APPLE_ID" \
                        --password "$APPLE_PASSWORD" \
                        --team-id "$APPLE_TEAM_ID"
                    fi
                    exit 1
                  fi

                  xcrun stapler staple "dist/Shoggoth.app"

            - name: Zip app for upload
              run: ditto -c -k --keepParent "dist/Shoggoth.app" Shoggoth.zip
              if: ${{ env.SHOULD_SIGN != 'true' }}

            - name: Zip signed app for upload
              if: ${{ env.SHOULD_SIGN == 'true' }}
              run: |
                  rm -f Shoggoth.zip
                  ditto -c -k --keepParent "dist/Shoggoth.app" Shoggoth.zip

            - uses: actions/upload-artifact@v4
              with:
                  name: shoggoth-mac
                  path: Shoggoth.zip

    build-windows:
        runs-on: windows-latest

        env:
            SDL_VERSION: 2.26.0

        steps:
            - uses: actions/checkout@v3

            - name: Cache SDL
              id: cache-windows-sdl
              uses: actions/cache@v3
              env:
                  cache-name: cache-sdl
              with:
                  path: C:\SDL2-*
                  key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ env.SDL_VERSION }}

            - if: ${{ steps.cache-windows-sdl.outputs.cache-hit != 'true' }}
              name: Download SDL if not cached
              run: |
                  Invoke-WebRequest "https://github.com/libsdl-org/SDL/releases/download/release-$env:SDL_VERSION/SDL2-devel-$env:SDL_VERSION-VC.zip" -OutFile C:\SDL.zip
                  Expand-Archive C:\SDL.zip -DestinationPath C:\

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.12"
            - name: Install uv
              uses: astral-sh/setup-uv@v6
            - name: Install the project
              run: uv sync
            - name: Install pyinstaller
              run: uv add --dev pyinstaller
            - name: Compile
              run: uv run --dev pyinstaller ShoggothStandalone.spec
            - uses: actions/upload-artifact@v4
              with:
                  name: shoggoth-win
                  path: dist/

    release:
        needs: [build-macos-intel, build-macos, build-windows]
        runs-on: ubuntu-latest
        if: startsWith(github.ref, 'refs/tags/v')
        steps:
            - uses: actions/checkout@v3
              with:
                  fetch-depth: 0

            - name: Get tag message
              id: tag_message
              run: |
                  git fetch --tags --force
                  TAG_MSG=$(git tag -l --format='%(contents)' ${{ github.ref_name }})
                  echo "body<<EOF" >> $GITHUB_OUTPUT
                  echo "$TAG_MSG" >> $GITHUB_OUTPUT
                  echo "EOF" >> $GITHUB_OUTPUT

            - uses: actions/download-artifact@v4
              with:
                  name: shoggoth-mac-intel
                  path: artifacts/mac-intel

            - uses: actions/download-artifact@v4
              with:
                  name: shoggoth-mac
                  path: artifacts/mac

            - uses: actions/download-artifact@v4
              with:
                  name: shoggoth-win
                  path: artifacts/win

            - name: Rename artifacts
              run: |
                  mv artifacts/mac-intel/Shoggoth.zip artifacts/Shoggoth-mac-intel.zip
                  mv artifacts/mac/Shoggoth.zip artifacts/Shoggoth-mac.zip
                  cd artifacts/win && zip -r ../Shoggoth-windows.zip .

            - uses: softprops/action-gh-release@v2
              with:
                  body: ${{ steps.tag_message.outputs.body }}
                  files: |
                      artifacts/Shoggoth-mac-intel.zip
                      artifacts/Shoggoth-mac.zip
                      artifacts/Shoggoth-windows.zip
