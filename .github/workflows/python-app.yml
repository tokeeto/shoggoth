name: Build Executable

on:
    push:
        branches: ["main"]
        tags: ["v*"]
    workflow_dispatch:
        inputs:
            sign:
                description: "Sign the macOS build"
                type: boolean
                default: false

jobs:
    build-macos-intel:
        runs-on: macos-15-intel
        steps:
            - uses: actions/checkout@v3
            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.12"
            - name: Install uv
              uses: astral-sh/setup-uv@v6
            - name: Install the project
              run: uv sync
            - name: Install pyinstaller
              run: uv add --dev pyinstaller

            - name: Import Apple Developer Certificate
              if: ${{ startsWith(github.ref, 'refs/tags/v') || inputs.sign == true }}
              env:
                  APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
                  APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
                  KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
              run: |
                  echo $APPLE_CERTIFICATE | base64 --decode > certificate.p12
                  security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
                  security default-keychain -s build.keychain
                  security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
                  security import certificate.p12 -k build.keychain \
                    -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
                  security set-key-partition-list -S apple-tool:,apple:,codesign: \
                    -s -k "$KEYCHAIN_PASSWORD" build.keychain
                  security find-identity -v -p codesigning build.keychain
                  rm certificate.p12

            - name: Compile
              run: uv run --dev pyinstaller ShoggothStandalone.spec
              env:
                  APPLE_SIGNING_IDENTITY: ${{ (startsWith(github.ref, 'refs/tags/v') || inputs.sign == true) && secrets.APPLE_SIGNING_IDENTITY || '' }}

            - name: Notarize and staple app
              if: ${{ startsWith(github.ref, 'refs/tags/v') || inputs.sign == true }}
              env:
                  APPLE_ID: ${{ secrets.APPLE_ID }}
                  APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
                  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
              run: |
                  ditto -c -k --keepParent "dist/Shoggoth.app" Shoggoth.zip
                  xcrun notarytool submit Shoggoth.zip \
                    --apple-id "$APPLE_ID" \
                    --password "$APPLE_PASSWORD" \
                    --team-id "$APPLE_TEAM_ID" \
                    --wait --timeout 900 2>&1 | tee notarize_output.txt

                  if ! grep -q "status: Accepted" notarize_output.txt; then
                    SUBMISSION_ID=$(grep -oE '[0-9a-f-]{36}' notarize_output.txt | head -1)
                    if [ -n "$SUBMISSION_ID" ]; then
                      xcrun notarytool log "$SUBMISSION_ID" \
                        --apple-id "$APPLE_ID" \
                        --password "$APPLE_PASSWORD" \
                        --team-id "$APPLE_TEAM_ID"
                    fi
                    exit 1
                  fi

                  xcrun stapler staple "dist/Shoggoth.app"

            - uses: actions/upload-artifact@v4
              if: ${{ startsWith(github.ref, 'refs/tags/v') || inputs.sign == true }}
              with:
                  name: shoggoth-mac-intel
                  path: dist/Shoggoth.app

            - uses: actions/upload-artifact@v4
              if: ${{ !(startsWith(github.ref, 'refs/tags/v') || inputs.sign == true) }}
              with:
                  name: shoggoth-mac-intel
                  path: dist/

    build-macos:
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v3
            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.12"
            - name: Install uv
              uses: astral-sh/setup-uv@v6
            - name: Install the project
              run: uv sync
            - name: Install pyinstaller
              run: uv add --dev pyinstaller

            - name: Import Apple Developer Certificate
              if: ${{ startsWith(github.ref, 'refs/tags/v') || inputs.sign == true }}
              env:
                  APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
                  APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
                  KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
              run: |
                  echo $APPLE_CERTIFICATE | base64 --decode > certificate.p12
                  security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
                  security default-keychain -s build.keychain
                  security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
                  security import certificate.p12 -k build.keychain \
                    -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
                  security set-key-partition-list -S apple-tool:,apple:,codesign: \
                    -s -k "$KEYCHAIN_PASSWORD" build.keychain
                  security find-identity -v -p codesigning build.keychain
                  rm certificate.p12

            - name: Compile
              run: uv run --dev pyinstaller ShoggothStandalone.spec
              env:
                  APPLE_SIGNING_IDENTITY: ${{ (startsWith(github.ref, 'refs/tags/v') || inputs.sign == true) && secrets.APPLE_SIGNING_IDENTITY || '' }}

            - name: Notarize and staple app
              if: ${{ startsWith(github.ref, 'refs/tags/v') || inputs.sign == true }}
              env:
                  APPLE_ID: ${{ secrets.APPLE_ID }}
                  APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
                  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
              run: |
                  ditto -c -k --keepParent "dist/Shoggoth.app" Shoggoth.zip
                  xcrun notarytool submit Shoggoth.zip \
                    --apple-id "$APPLE_ID" \
                    --password "$APPLE_PASSWORD" \
                    --team-id "$APPLE_TEAM_ID" \
                    --wait --timeout 900 2>&1 | tee notarize_output.txt

                  if ! grep -q "status: Accepted" notarize_output.txt; then
                    SUBMISSION_ID=$(grep -oE '[0-9a-f-]{36}' notarize_output.txt | head -1)
                    if [ -n "$SUBMISSION_ID" ]; then
                      xcrun notarytool log "$SUBMISSION_ID" \
                        --apple-id "$APPLE_ID" \
                        --password "$APPLE_PASSWORD" \
                        --team-id "$APPLE_TEAM_ID"
                    fi
                    exit 1
                  fi

                  xcrun stapler staple "dist/Shoggoth.app"

            - uses: actions/upload-artifact@v4
              if: ${{ startsWith(github.ref, 'refs/tags/v') || inputs.sign == true }}
              with:
                  name: shoggoth-mac
                  path: dist/Shoggoth.app

            - uses: actions/upload-artifact@v4
              if: ${{ !(startsWith(github.ref, 'refs/tags/v') || inputs.sign == true) }}
              with:
                  name: shoggoth-mac
                  path: dist/

    build-windows:
        runs-on: windows-latest

        env:
            SDL_VERSION: 2.26.0

        steps:
            - uses: actions/checkout@v3

            - name: Cache SDL
              id: cache-windows-sdl
              uses: actions/cache@v3
              env:
                  cache-name: cache-sdl
              with:
                  path: C:\SDL2-*
                  key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ env.SDL_VERSION }}

            - if: ${{ steps.cache-windows-sdl.outputs.cache-hit != 'true' }}
              name: Download SDL if not cached
              run: |
                  Invoke-WebRequest "https://github.com/libsdl-org/SDL/releases/download/release-$env:SDL_VERSION/SDL2-devel-$env:SDL_VERSION-VC.zip" -OutFile C:\SDL.zip
                  Expand-Archive C:\SDL.zip -DestinationPath C:\

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.12"
            - name: Install uv
              uses: astral-sh/setup-uv@v6
            - name: Install the project
              run: uv sync
            - name: Install pyinstaller
              run: uv add --dev pyinstaller
            - name: Compile
              run: uv run --dev pyinstaller ShoggothStandalone.spec
            - uses: actions/upload-artifact@v4
              with:
                  name: shoggoth-win
                  path: dist/
